<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hit & Blow Solver</title>

    <link rel="stylesheet" href="css/style.css">
</head>

<body>

    <header>
        <h1>Hit & Blow Solver</h1>
    </header>

    <main>

    <section id="how-to">
        <h2>使い方</h2>
        <ol>
            <li>
                アソビ大全51のヒットアンドブローで予想する色を入力します。
            </li>
            <li>
                ゲーム画面で表示されたHit数・Blow数を入力します。
            </li>
            <li>
                必要に応じて候補やヒートマップを確認してください。
            </li>
        </ol>
    </section>

        <section id="guess">
            <h2>結果入力</h2>
            <div id="guess-area"></div>
            <div id="color-palette"></div>
            <div id="result-input">
                <div>
                    <label>Hit</label>
                    <select id="hit-input">
                        <option value="0">0</option>
                        <option value="1">1</option>
                        <option value="2">2</option>
                        <option value="3">3</option>
                        <option value="4">4</option>
                    </select>
                </div>
                <div>
                    <label>Blow</label>
                    <select id="blow-input">
                        <option value="0">0</option>
                        <option value="1">1</option>
                        <option value="2">2</option>
                        <option value="3">3</option>
                        <option value="4">4</option>
                    </select>
                </div>
                <button id="confirm-button">
                    確定
                </button>
            </div>
        </section>

        <section id="history">
             <h2>履歴</h2>
         </section>

        <section id="analysis">
            <h2>分析</h2>
            <section id="candidate">
                <h2>候補</h2>
                <button id="toggle-candidate-button">候補を見る</button>

                <div id="candidate-area" class="hidden">
                    <p>
                        残り候補数：
                        <span id="candidate-count">0</span>
                    </p>
                    <div id="candidate-list"></div>
                </div>
            </section>

            <section id="heatmap">
                <h2>ヒートマップ</h2>
                <button id="toggle-heatmap-button">ヒートマップを見る</button>

                <div id="heatmap-area" class="hidden">
                    <div id="heatmap-list"></div>
                </div>
            </section>
        </section>

        <section id="recommend">
            <h2>おすすめ</h2>
        </section>

    </main>

    <script src="js/solver.js"></script>
    <script src="js/script.js"></script>
    <script src="js/test.js"></script>
</body>
</html>
